name: Deploy to GCE

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USER }}
          key: ${{ secrets.GCE_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin

            cd ~/shootai
            git pull origin master
            pm2 stop shootai || true
            npm install
            npm run build
            cd ~/shootai/server
            pm2 startOrRestart ecosystem.config.js --env production
            cd ~/shootai

            # Ensure nginx allows large batch payloads (base64 images)
            if ! grep -q 'client_max_body_size' /etc/nginx/sites-available/default; then
              sudo sed -i '/proxy_read_timeout/a \\t\tclient_max_body_size 250m;' /etc/nginx/sites-available/default
              sudo nginx -t && sudo systemctl reload nginx
              echo "nginx updated with client_max_body_size 250m"
            fi

            echo "Deploy complete"
